<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMC Treasure Hunt - Clue #4</title>
    <style>
        :root {
            --brand-dark: #121212;
            --brand-main: #FFD700; 
            --brand-blue: #228B22; 
            --brand-magenta: #C71585; 
            --brand-text: #ffffff;
            --box-bg: rgba(30, 30, 30, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-text);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .cemc-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(18, 18, 18, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 2px solid var(--brand-blue); /* Changed to Blue for this clue */
            box-shadow: 0 4px 15px rgba(34, 139, 34, 0.2);
        }

        .cemc-acronym {
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--brand-main);
            text-shadow: 0 0 8px var(--brand-main);
        }

        /* --- Meme Section --- */
        .meme-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px;
            box-sizing: border-box;
            position: relative;
            background: radial-gradient(circle at center, rgba(34, 139, 34, 0.2) 0%, rgba(18, 18, 18, 1) 70%);
        }

        .meme-image {
            max-width: 85%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 3px solid var(--brand-blue);
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--brand-blue);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- Message Section --- */
        .text-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, rgba(18, 18, 18, 1) 70%);
        }

        .club-logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.4));
        }

        /* --- Riddle Card --- */
        .text-card {
            background: var(--box-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(34, 139, 34, 0.2);
            text-align: center;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .clue-tag {
            background: var(--brand-blue);
            color: #fff;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        .riddle-text {
            line-height: 1.9;
            font-size: 1.25rem;
            font-weight: 400;
            color: #f0f0f0;
            white-space: pre-line;
        }

        .highlight-gold {
            color: var(--brand-main);
            font-weight: 700;
        }

        .highlight-romance {
            color: var(--brand-magenta);
            font-weight: 700;
        }

        .action-callout {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 1rem;
            color: #aaa;
            font-style: italic;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cemc-header">
        <div class="cemc-acronym">CEMC</div>
    </div>

    <div class="meme-container">
        <img src="https://i.postimg.cc/xjstVt7M/Anuj.jpg" alt="Meme" class="meme-image">
        <div class="scroll-hint">↓ Hungry for more? ↓</div>
    </div>

    <div class="text-section">
        <img src="https://i.postimg.cc/fTYYLyFW/CEMC_final.png" alt="CEMC Logo" class="club-logo">

        <div class="text-card">
            <div class="card-header">
                <span class="clue-tag">#CLUE_01</span>
            </div>
            
            <p class="riddle-text">
                Campus ki ek jagah hai jahan <span class="highlight-gold">snacks milte hain…</span>
                par kuch log wahan gossip sessions aur <span class="highlight-romance">Romance</span> ke liye zyada jaate hain.

                Aap toh us jagah ke kaafi <span class="highlight-gold">loyal customer</span> ho.
                
                Aaj wahan jaake dekho…
                kuch interesting aapka wait kar raha hai…
            </p>
            
            <div class="action-callout">
                Grab a bite, find the site. 🍔
            </div>
        </div>
    </div>

</body>
</html>
